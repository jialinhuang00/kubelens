# kubelens resource configuration.
# Single source of truth for "which Kubernetes kinds the app knows about".
# Replaces the kind lists that were hardcoded across the frontend resource
# tree, the kubectl name-prefix map, and the graph endpoint.
#
# Per-kind fields:
#   kind         k8s Kind, as it appears in `item.kind` (e.g. Deployment)
#   key          short plural id, used as the internal map key (e.g. deployments)
#   resourceType `kubectl get` target. Bare plural for built-ins; <plural>.<group> for CRDs
#   namePrefix   prefix in `kubectl get -o name` output (e.g. deployment.apps), reverse-mapped to kind
#   group        API group ('' = core). Used for snapshot filenames and CRD detection
#   label        display label
#   color        node/tree colour
#   priority     true = fetched in the first batch (frontend tree)
#   show         capability: which views this kind CAN appear in (tree | graph)
#   default      default-ON views (subset of show). Absent = same as show.
#                Use to ship a kind "capable but off" — e.g. show:[graph] default:[]
#                stays graph-toggleable in the panel but doesn't render until enabled.
#
# `show` mirrors the current per-view behaviour 1:1. Divergences (e.g. Gateway
# not in tree) are preserved here as explicit decisions, not silently changed.

version: '1'

resources:
  # --- Workloads ---
  - { kind: Deployment, key: deployments, resourceType: deployments, namePrefix: deployment.apps, group: apps, label: Deployments, color: '#e8b866', priority: true, show: [tree, graph], aliases: [deploy] }
  - { kind: StatefulSet, key: statefulsets, resourceType: statefulsets, namePrefix: statefulset.apps, group: apps, label: StatefulSets, color: '#e0a050', show: [tree, graph], aliases: [sts] }
  - { kind: DaemonSet, key: daemonsets, resourceType: daemonsets, namePrefix: daemonset.apps, group: apps, label: DaemonSets, color: '#d4956a', show: [tree, graph], aliases: [ds] }
  - { kind: CronJob, key: cronjobs, resourceType: cronjobs, namePrefix: cronjob.batch, group: batch, label: CronJobs, color: '#c8a060', show: [tree, graph], aliases: [cj] }
  - { kind: Job, key: jobs, resourceType: jobs, namePrefix: job.batch, group: batch, label: Jobs, color: '#b89860', show: [tree] }
  - { kind: Pod, key: pods, resourceType: pods, namePrefix: pod, group: '', label: Pods, color: '#f0d080', priority: true, show: [tree, graph] }
  - { kind: ReplicaSet, key: replicasets, resourceType: replicasets, namePrefix: replicaset.apps, group: apps, label: ReplicaSets, color: '#c0b880', show: [tree] }
  # --- Networking ---
  - { kind: Service, key: services, resourceType: services, namePrefix: service, group: '', label: Services, color: '#80c0b0', priority: true, show: [tree, graph], aliases: [svc] }
  - { kind: Ingress, key: ingresses, resourceType: ingresses, namePrefix: ingress.networking.k8s.io, group: networking.k8s.io, label: Ingresses, color: '#70b8a8', show: [tree, graph], aliases: [ing] }
  - { kind: NetworkPolicy, key: networkpolicies, resourceType: networkpolicies, namePrefix: networkpolicy.networking.k8s.io, group: networking.k8s.io, label: NetworkPolicies, color: '#90a8b8', show: [tree], aliases: [netpol] }
  # --- Config ---
  - { kind: ConfigMap, key: configmaps, resourceType: configmaps, namePrefix: configmap, group: '', label: ConfigMaps, color: '#a0b880', show: [tree, graph], aliases: [cm] }
  - { kind: Secret, key: secrets, resourceType: secrets, namePrefix: secret, group: '', label: Secrets, color: '#c0a8a0', show: [tree, graph] }
  # --- Storage ---
  - { kind: PersistentVolumeClaim, key: persistentvolumeclaims, resourceType: persistentvolumeclaims, namePrefix: persistentvolumeclaim, group: '', label: PVCs, color: '#90b0c8', show: [tree, graph], aliases: [pvc] }
  # --- Scaling ---
  - { kind: HorizontalPodAutoscaler, key: horizontalpodautoscalers, resourceType: horizontalpodautoscalers, namePrefix: horizontalpodautoscaler.autoscaling, group: autoscaling, label: HPAs, color: '#b8a080', show: [tree, graph], aliases: [hpa] }
  # --- RBAC ---
  - { kind: ServiceAccount, key: serviceaccounts, resourceType: serviceaccounts, namePrefix: serviceaccount, group: '', label: ServiceAccounts, color: '#a8a0c0', show: [tree, graph], aliases: [sa] }
  - { kind: Role, key: roles, resourceType: roles, namePrefix: role.rbac.authorization.k8s.io, group: rbac.authorization.k8s.io, label: Roles, color: '#b0a0c8', show: [tree] }
  - { kind: RoleBinding, key: rolebindings, resourceType: rolebindings, namePrefix: rolebinding.rbac.authorization.k8s.io, group: rbac.authorization.k8s.io, label: RoleBindings, color: '#a898b8', show: [tree, graph] }
  # --- CRDs (cluster-dependent; not every cluster runs these) ---
  # Built-ins above are universal. CRDs below ship off by default (show: []):
  # they appear in the visibility panel as known kinds (with this label/colour),
  # and you flip them on if your cluster runs them. Gateway API kinds default to
  # graph instead — the topology builder has first-class edges for them and the
  # fetch no-ops gracefully on clusters without Gateway API.
  - { kind: Application, key: applications, resourceType: applications.argoproj.io, namePrefix: application.argoproj.io, group: argoproj.io, label: Applications, color: '#e07850', show: [tree], default: [] }
  - { kind: Gateway, key: gateways, resourceType: gateways.gateway.networking.k8s.io, namePrefix: gateway.gateway.networking.k8s.io, group: gateway.networking.k8s.io, label: Gateways, color: '#6ab0a0', show: [graph] }
  - { kind: HTTPRoute, key: httproutes, resourceType: httproutes.gateway.networking.k8s.io, namePrefix: httproute.gateway.networking.k8s.io, group: gateway.networking.k8s.io, label: HTTPRoutes, color: '#7ab8b8', show: [graph] }
  - { kind: TCPRoute, key: tcproutes, resourceType: tcproutes.gateway.networking.k8s.io, namePrefix: tcproute.gateway.networking.k8s.io, group: gateway.networking.k8s.io, label: TCPRoutes, color: '#8ac0c0', show: [graph] }

# Discovery (Step 3): the visibility panel lists kinds the cluster actually has
# (kubectl api-resources). These groups/resources are pure cluster plumbing that
# nobody browses — excluded from the panel by default. Edit to taste.
discovery:
  exclude:
    groups:
      - coordination.k8s.io      # leases (leader election)
      - discovery.k8s.io         # endpointslices
      - events.k8s.io            # events
      - resource.k8s.io          # dynamic resource allocation (alpha)
      - vpcresources.k8s.aws      # EKS networking internals
      - crd.k8s.amazonaws.com     # EKS internals
      - networking.k8s.aws        # EKS network policy internals
      - elbv2.k8s.aws             # AWS load balancer controller internals
    resources:
      - events
      - endpoints
      - controllerrevisions

# --- Copied from kubelens.default.yaml by init (the seed). Edit the seed
# --- and re-run `pnpm run init -- --merge` to refresh these.
templates:
  Deployment:
    - name: Rollout Status
      command: kubectl rollout status deployment/{name} -n {namespace}
    - name: History
      command: kubectl rollout history deployment/{name} -n {namespace}
    - name: Details
      command: kubectl describe deployment {name} -n {namespace}
  Pod:
    - name: Logs
      command: kubectl logs {name} -n {namespace} --tail=50 -f
    - name: Previous Logs
      command: kubectl logs {name} -n {namespace} --previous --tail=100
    - name: Details
      command: kubectl describe pod {name} -n {namespace}
    - name: YAML
      command: kubectl get pod {name} -n {namespace} -o yaml
    - name: Exec Shell
      command: kubectl exec -it {name} -n {namespace} -- /bin/sh
      disabled: true
    - name: Delete
      command: kubectl delete pod {name} -n {namespace}
  Service:
    - name: Details
      command: kubectl describe service {name} -n {namespace}
    - name: Endpoints
      command: kubectl get endpoints {name} -n {namespace} -o wide
    - name: Port Forward
      command: kubectl port-forward service/{name} 8080:80 -n {namespace}
    - name: YAML
      command: kubectl get service {name} -n {namespace} -o yaml
    - name: Change to NodePort
      command: kubectl patch service {name} -n {namespace} -p '{"spec":{"type":"NodePort"}}'
    - name: Change to ClusterIP
      command: kubectl patch service {name} -n {namespace} -p '{"spec":{"type":"ClusterIP"}}'
  CronJob:
    - name: Details
      command: kubectl describe cronjob {name} -n {namespace}
    - name: YAML
      command: kubectl get cronjob {name} -n {namespace} -o yaml
    - name: Suspend
      command: kubectl patch cronjob {name} -n {namespace} -p '{"spec":{"suspend":true}}'
    - name: Resume
      command: kubectl patch cronjob {name} -n {namespace} -p '{"spec":{"suspend":false}}'
    - name: Trigger Now
      command: kubectl create job {name}-manual --from=cronjob/{name} -n {namespace}
  StatefulSet:
    - name: Details
      command: kubectl describe statefulset {name} -n {namespace}
    - name: YAML
      command: kubectl get statefulset {name} -n {namespace} -o yaml
    - name: Rollout Status
      command: kubectl rollout status statefulset/{name} -n {namespace}
    - name: Restart
      command: kubectl rollout restart statefulset/{name} -n {namespace}
    - name: Scale
      command: kubectl scale statefulset {name} --replicas= -n {namespace}
      requiresInput: true
  Job:
    - name: Details
      command: kubectl describe job {name} -n {namespace}
    - name: Logs
      command: kubectl logs job/{name} -n {namespace} --tail=50
    - name: YAML
      command: kubectl get job {name} -n {namespace} -o yaml
    - name: Delete
      command: kubectl delete job {name} -n {namespace}
  ConfigMap:
    - name: Details
      command: kubectl describe configmap {name} -n {namespace}
    - name: YAML
      command: kubectl get configmap {name} -n {namespace} -o yaml
    - name: Data (JSON)
      command: kubectl get configmap {name} -n {namespace} -o jsonpath="{.data}"
  Secret:
    - name: Details
      command: kubectl describe secret {name} -n {namespace}
    - name: YAML
      command: kubectl get secret {name} -n {namespace} -o yaml
    - name: Decode
      command: 'kubectl get secret {name} -n {namespace} -o jsonpath="{.data}" | jq ''to_entries[] | {key: .key, value: (.value | @base64d)}'''
  PersistentVolumeClaim:
    - name: Details
      command: kubectl describe pvc {name} -n {namespace}
    - name: YAML
      command: kubectl get pvc {name} -n {namespace} -o yaml
  ServiceAccount:
    - name: Details
      command: kubectl describe serviceaccount {name} -n {namespace}
    - name: YAML
      command: kubectl get serviceaccount {name} -n {namespace} -o yaml
  Ingress:
    - name: Details
      command: kubectl describe ingress {name} -n {namespace}
    - name: YAML
      command: kubectl get ingress {name} -n {namespace} -o yaml
    - name: Endpoints
      command: kubectl get endpoints -n {namespace}
  DaemonSet:
    - name: Details
      command: kubectl describe daemonset {name} -n {namespace}
    - name: YAML
      command: kubectl get daemonset {name} -n {namespace} -o yaml
    - name: Rollout Status
      command: kubectl rollout status daemonset/{name} -n {namespace}
    - name: Restart
      command: kubectl rollout restart daemonset/{name} -n {namespace}
  ReplicaSet:
    - name: Details
      command: kubectl describe replicaset {name} -n {namespace}
    - name: YAML
      command: kubectl get replicaset {name} -n {namespace} -o yaml
    - name: Scale
      command: kubectl scale replicaset {name} --replicas= -n {namespace}
      requiresInput: true
  HorizontalPodAutoscaler:
    - name: Details
      command: kubectl describe hpa {name} -n {namespace}
    - name: YAML
      command: kubectl get hpa {name} -n {namespace} -o yaml
    - name: Status
      command: kubectl get hpa {name} -n {namespace} -o wide
  NetworkPolicy:
    - name: Details
      command: kubectl describe networkpolicy {name} -n {namespace}
    - name: YAML
      command: kubectl get networkpolicy {name} -n {namespace} -o yaml
  Role:
    - name: Details
      command: kubectl describe role {name} -n {namespace}
    - name: YAML
      command: kubectl get role {name} -n {namespace} -o yaml
  RoleBinding:
    - name: Details
      command: kubectl describe rolebinding {name} -n {namespace}
    - name: YAML
      command: kubectl get rolebinding {name} -n {namespace} -o yaml
  Application:
    - name: Summary
      command: >-
        kubectl get applications.argoproj.io {name} -n {namespace} -o
        custom-columns="SYNC:.status.sync.status,HEALTH:.status.health.status,REPO:.spec.source.repoURL,PATH:.spec.source.path,REVISION:.spec.source.targetRevision,DEST_NS:.spec.destination.namespace"
    - name: Resources
      command: kubectl get applications.argoproj.io {name} -n {namespace} -o jsonpath="{range .status.resources[*]}{.kind}/{.name} {.status} {.health.status}{'\n'}{end}"
    - name: Details
      command: kubectl describe applications.argoproj.io {name} -n {namespace}
    - name: YAML
      command: kubectl get applications.argoproj.io {name} -n {namespace} -o yaml
tables:
  Deployment:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 38
      - name: READY
        value: '{.status.readyReplicas?0}/{.spec.replicas?1}'
        width: 8
      - name: UP-TO-DATE
        value: '{.status.updatedReplicas?0}'
        width: 13
      - name: AVAILABLE
        value: '{.status.availableReplicas?0}'
        width: 12
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  Service:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 32
      - name: TYPE
        value: '{.spec.type?ClusterIP}'
        width: 12
      - name: CLUSTER-IP
        value: '{.spec.clusterIP?<none>}'
        width: 17
      - name: EXTERNAL-IP
        value: '{.spec.externalIPs|join?<none>}'
        width: 14
      - name: PORT(S)
        value: '{.spec.ports|ports?<none>}'
        width: 29
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  CronJob:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 31
      - name: SCHEDULE
        value: '{.spec.schedule?* * * * *}'
        width: 15
      - name: SUSPEND
        value: '{.spec.suspend|bool}'
        width: 10
      - name: ACTIVE
        value: '{.status.active|count}'
        width: 9
      - name: LAST SCHEDULE
        value: '{.status.lastScheduleTime|age?<none>}'
        width: 16
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  StatefulSet:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 22
      - name: READY
        value: '{.status.readyReplicas?0}/{.spec.replicas?1}'
        width: 8
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  Job:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 35
      - name: COMPLETIONS
        value: '{.status.succeeded?0}/{.spec.completions?1}'
        width: 14
      - name: DURATION
        value: '{|jobDuration}'
        width: 11
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  ConfigMap:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 34
      - name: DATA
        value: '{.data|keys}'
        width: 7
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  Endpoints:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 32
      - name: ENDPOINTS
        value: '{|endpoints}'
        width: 35
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  Secret:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 44
      - name: TYPE
        value: '{.type?Opaque}'
        width: 36
      - name: DATA
        value: '{.data|keys}'
        width: 7
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  PersistentVolumeClaim:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 28
      - name: STATUS
        value: '{.status.phase?<unknown>}'
        width: 9
      - name: VOLUME
        value: '{.spec.volumeName}'
        width: 38
      - name: CAPACITY
        value: '{.status.capacity.storage}'
        width: 11
      - name: ACCESS MODES
        value: '{.spec.accessModes|accessModes?<none>}'
        width: 15
      - name: STORAGECLASS
        value: '{.spec.storageClassName?<none>}'
        width: 15
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  ServiceAccount:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 38
      - name: SECRETS
        value: '{.secrets|count}'
        width: 10
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  DaemonSet:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 22
      - name: DESIRED
        value: '{.status.desiredNumberScheduled?0}'
        width: 9
      - name: CURRENT
        value: '{.status.currentNumberScheduled?0}'
        width: 9
      - name: READY
        value: '{.status.numberReady?0}'
        width: 7
      - name: UP-TO-DATE
        value: '{.status.updatedNumberScheduled?0}'
        width: 12
      - name: AVAILABLE
        value: '{.status.numberAvailable?0}'
        width: 11
      - name: NODE SELECTOR
        value: '{.spec.template.spec.nodeSelector|kv?<none>}'
        width: 20
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  Ingress:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 20
      - name: CLASS
        value: '{.spec.ingressClassName?<none>}'
        width: 16
      - name: HOSTS
        value: '{|ingressHosts}'
        width: 30
      - name: ADDRESS
        value: '{|ingressAddress}'
        width: 20
      - name: PORTS
        value: '{|ingressPorts}'
        width: 10
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  HorizontalPodAutoscaler:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 20
      - name: REFERENCE
        value: '{.spec.scaleTargetRef|ref}'
        width: 28
      - name: TARGETS
        value: '{|hpaTargets}'
        width: 16
      - name: MINPODS
        value: '{.spec.minReplicas?1}'
        width: 9
      - name: MAXPODS
        value: '{.spec.maxReplicas?1}'
        width: 9
      - name: REPLICAS
        value: '{.status.currentReplicas?0}'
        width: 10
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  Role:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 40
      - name: CREATED AT
        value: '{.metadata.creationTimestamp?<unknown>}'
  RoleBinding:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 40
      - name: ROLE
        value: '{.roleRef|ref:Role}'
        width: 36
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
  NetworkPolicy:
    columns:
      - name: NAME
        value: '{.metadata.name}'
        width: 24
      - name: POD-SELECTOR
        value: '{.spec.podSelector.matchLabels|kv?<none>}'
        width: 40
      - name: AGE
        value: '{.metadata.creationTimestamp|age}'
