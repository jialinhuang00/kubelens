apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
# Shared config the gateway reads: CORS origins + where B/C live.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: demo
data:
  CORS_ALLOWED_ORIGINS: "http://localhost:4200"
  ORDERS_URL: "http://orders.demo.svc.cluster.local"
  INVENTORY_URL: "http://inventory.demo.svc.cluster.local"
  LOG_LEVEL: "info"
---
# gateway nginx: serves an interactive page with buttons, reverse-proxies
# /orders/ and /inventory/ to the B/C services, and exposes /whoami (its own pod
# name). keepalive off so each request re-balances across pods.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx
  namespace: demo
data:
  default.conf: |
    server {
      listen 80;
      keepalive_timeout 0;
      resolver 10.96.0.10 valid=10s;
      location = /whoami {
        default_type text/plain;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 "served by gateway pod: $hostname\n";
      }
      location /orders/ {
        proxy_pass http://orders.demo.svc.cluster.local/;
      }
      location /inventory/ {
        proxy_pass http://inventory.demo.svc.cluster.local/;
      }
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
    }
  index.html: |
    <!doctype html>
    <html><head><meta charset="utf-8"><title>kubelens demo — gateway</title>
    <style>
      body{font-family:'JetBrains Mono',monospace;background:#2e3440;color:#d8dee9;padding:2rem;max-width:640px;margin:auto}
      h2{color:#88c0d0}
      button{background:#88c0d0;color:#2e3440;border:0;padding:.6rem 1rem;margin:.3rem .3rem 0 0;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700}
      button:hover{background:#8fbcbb}
      pre{background:#3b4252;padding:1rem;border-radius:6px;white-space:pre-wrap;min-height:3rem}
      .dim{color:#81a1c1}
    </style></head><body>
      <h2>gateway (A)</h2>
      <p class="dim" id="gw">gateway pod: …</p>
      <button onclick="call('/orders/','B (orders)')">Call B (orders)</button>
      <button onclick="call('/inventory/','C (inventory)')">Call C (inventory)</button>
      <button onclick="loop('/orders/',20)">Hit B ×20 (watch LB)</button>
      <pre id="out">click a button…</pre>
      <script>
        const out=document.getElementById('out');
        const podOf=t=>(t.match(/Hostname:\s*(\S+)/)||[,t.trim()])[1];
        fetch('/whoami').then(r=>r.text()).then(t=>{document.getElementById('gw').textContent=t.trim();});
        async function call(path,label){
          out.textContent='…';
          const t=await (await fetch(path,{cache:'no-store'})).text();
          out.textContent=label+'  ←  served by pod: '+podOf(t);
        }
        async function loop(path,n){
          out.textContent='…';
          const tally={};
          for(let i=0;i<n;i++){
            const t=await (await fetch(path,{cache:'no-store'})).text();
            const p=podOf(t); tally[p]=(tally[p]||0)+1;
          }
          out.textContent=Object.entries(tally).map(([k,v])=>k+': '+v).join('\n');
        }
      </script>
    </body></html>
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: demo
type: Opaque
stringData:
  API_KEY: "demo-supersecret-key"
  JWT_SIGNING_SECRET: "change-me-in-prod"
---
# A — frontend-facing gateway. Serves its own pod name via nginx (mounts the
# gateway-nginx ConfigMap → uses-configmap edge), also reads app-config +
# app-secrets. Exposed at host:8080 (LoadBalancer with a fixed NodePort).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: demo
  labels: { app: gateway, tier: edge }
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway, tier: edge }
    spec:
      containers:
        - name: gateway
          image: nginx:alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          volumeMounts:
            - name: gw
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: gw
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: gw
          configMap:
            name: gateway-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: demo
  labels: { app: gateway }
spec:
  type: LoadBalancer
  selector: { app: gateway }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
# B — orders microservice. A calls it (see ORDERS_URL above). LoadBalancer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: demo
  labels: { app: orders, tier: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: orders }
  template:
    metadata:
      labels: { app: orders, tier: backend }
    spec:
      containers:
        - name: orders
          image: traefik/whoami
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: demo
  labels: { app: orders }
spec:
  type: LoadBalancer
  selector: { app: orders }
  ports:
    - port: 80
      targetPort: 80
---
# C — inventory microservice (internal). A calls it (INVENTORY_URL). ClusterIP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: demo
  labels: { app: inventory, tier: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: inventory }
  template:
    metadata:
      labels: { app: inventory, tier: backend }
    spec:
      containers:
        - name: inventory
          image: traefik/whoami
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: demo
  labels: { app: inventory }
spec:
  type: ClusterIP
  selector: { app: inventory }
  ports:
    - port: 80
      targetPort: 80
