<div class="terminal-container">
  <div class="sidebar-wrapper" [class.collapsed]="sidebarCollapsed()">
    <app-terminal-sidebar />
  </div>
  <button class="collapse-toggle sidebar-toggle" (click)="toggleSidebar()" [title]="sidebarCollapsed() ? 'Show sidebar' : 'Hide sidebar'">
    <span class="toggle-arrow">{{ sidebarCollapsed() ? '&#x25B6;' : '&#x25C0;' }}</span>
  </button>
  <div class="main-area">
    <div class="main-header">
      <span class="main-title">K8s Terminal</span>
      <div style="display:flex;align-items:center;gap:8px">
        <app-visibility-panel />
        <app-handbook />
        <app-mem-monitor />
      </div>
    </div>
    <app-panel-area />
    <app-command-bar />
  </div>
</div>
